<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Diagram comparing a secured perimeter edge — where wind deflects off a properly anchored coping — with a failed edge where wind gets under a lifted cap, peels the membrane, and triggers system loss. 60 percent of low-slope roof failures start at the perimeter edge.">
  <defs>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152239"/>
      <stop offset="1" stop-color="#0A1226"/>
    </linearGradient>
    <marker id="arrowCopper" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#C8732D"/>
    </marker>
    <marker id="arrowSteel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6B7785"/>
    </marker>
  </defs>

  <!-- Card background -->
  <rect width="800" height="500" fill="#F6F8FB"/>

  <!-- Stat callout -->
  <text x="40" y="74" font-family="Fjalla One, Impact, sans-serif" font-size="64" fill="#C8732D" letter-spacing="-1">60%</text>
  <text x="40" y="100" font-family="IBM Plex Mono, monospace" font-size="12" fill="#152239" letter-spacing="2">OF LOW-SLOPE ROOF FAILURES START</text>
  <text x="40" y="118" font-family="IBM Plex Mono, monospace" font-size="12" fill="#152239" letter-spacing="2">AT THE PERIMETER EDGE.</text>

  <!-- ============= PANEL A: SECURED ============= -->
  <g transform="translate(40, 160)">
    <!-- Panel frame label -->
    <rect x="0" y="0" width="350" height="280" fill="none" stroke="#D8DDE4" stroke-width="1"/>
    <text x="12" y="22" font-family="IBM Plex Mono, monospace" font-size="11" fill="#3F8B55" letter-spacing="2">A · SECURED</text>

    <!-- Wind arrows deflecting up over the cap -->
    <g stroke="#6B7785" stroke-width="1.5" fill="none" opacity="0.85">
      <path d="M 330 80 Q 240 80 220 60" marker-end="url(#arrowSteel)"/>
      <path d="M 330 110 Q 240 110 220 88" marker-end="url(#arrowSteel)"/>
      <path d="M 330 140 Q 240 140 220 118" marker-end="url(#arrowSteel)"/>
    </g>

    <!-- Building cross-section -->
    <rect x="40" y="170" width="280" height="100" fill="url(#roofGrad)"/>
    <!-- Membrane flat across deck -->
    <rect x="40" y="160" width="280" height="10" fill="#3B7FB8"/>
    <!-- Continuous-cleat coping (sits over the parapet, locked down) -->
    <path d="M 32 152 L 32 168 L 38 168 L 38 158 L 200 158 L 200 168 L 206 168 L 206 152 Z"
          fill="#C8732D"/>
    <!-- Anchor fasteners -->
    <circle cx="60"  cy="163" r="2" fill="#152239"/>
    <circle cx="100" cy="163" r="2" fill="#152239"/>
    <circle cx="140" cy="163" r="2" fill="#152239"/>
    <circle cx="180" cy="163" r="2" fill="#152239"/>

    <!-- Caption -->
    <text x="12" y="262" font-family="IBM Plex Mono, monospace" font-size="10" fill="#6B7785" letter-spacing="1.5">ES-1 COPING · WIND DEFLECTS · MEMBRANE LOCKED</text>
  </g>

  <!-- ============= PANEL B: FAILED ============= -->
  <g transform="translate(410, 160)">
    <!-- Panel frame label -->
    <rect x="0" y="0" width="350" height="280" fill="none" stroke="#D8DDE4" stroke-width="1"/>
    <text x="12" y="22" font-family="IBM Plex Mono, monospace" font-size="11" fill="#A8331C" letter-spacing="2">B · FAILED</text>

    <!-- Wind arrows wedging UNDER the lifted cap -->
    <g stroke="#C8732D" stroke-width="1.6" fill="none">
      <path d="M 330 150 L 220 150" stroke-dasharray="5 3" marker-end="url(#arrowCopper)"/>
      <path d="M 330 170 L 200 170" stroke-dasharray="5 3" marker-end="url(#arrowCopper)"/>
      <path d="M 330 190 L 180 190" stroke-dasharray="5 3" marker-end="url(#arrowCopper)"/>
    </g>

    <!-- Building cross-section -->
    <rect x="40" y="170" width="280" height="100" fill="url(#roofGrad)"/>

    <!-- Membrane peeling backward in a wave -->
    <path d="M 40 170 L 130 170 Q 170 170 195 150 Q 220 128 250 138 L 250 148 Q 222 142 200 162 Q 175 184 130 180 L 40 180 Z"
          fill="#3B7FB8"/>

    <!-- Failed coping — lifted and rotated off the parapet -->
    <g transform="translate(80, 60) rotate(-32)">
      <path d="M 0 0 L 0 16 L 6 16 L 6 6 L 110 6 L 110 16 L 116 16 L 116 0 Z"
            fill="#C8732D"/>
    </g>
    <!-- Pulled-out fastener heads on the parapet -->
    <line x1="60"  y1="160" x2="60"  y2="172" stroke="#A8331C" stroke-width="1.5"/>
    <line x1="100" y1="160" x2="100" y2="172" stroke="#A8331C" stroke-width="1.5"/>
    <line x1="140" y1="160" x2="140" y2="172" stroke="#A8331C" stroke-width="1.5"/>

    <!-- Caption -->
    <text x="12" y="262" font-family="IBM Plex Mono, monospace" font-size="10" fill="#6B7785" letter-spacing="1.5">CAP LIFTS · WIND ENTERS · MEMBRANE PEELS</text>
  </g>

  <!-- Bottom caption -->
  <text x="40" y="478" font-family="IBM Plex Mono, monospace" font-size="11" fill="#6B7785" letter-spacing="2">FIG · 01   PERIMETER FAILURE → MEMBRANE UPLIFT → SYSTEM LOSS</text>
</svg>
