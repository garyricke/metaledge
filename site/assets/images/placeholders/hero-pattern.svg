<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="heroSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1226"/>
      <stop offset="0.5" stop-color="#152239"/>
      <stop offset="1" stop-color="#1F3A66"/>
    </linearGradient>
    <linearGradient id="heroPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F3A66"/>
      <stop offset="0.45" stop-color="#152239"/>
      <stop offset="1" stop-color="#0A1226"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(200,115,45,0.0)"/>
      <stop offset="1" stop-color="rgba(200,115,45,0.45)"/>
    </linearGradient>
    <pattern id="heroSeam" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <rect width="56" height="56" fill="transparent"/>
      <line x1="56" y1="0" x2="56" y2="56" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <line x1="0" y1="56" x2="56" y2="56" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#heroSky)"/>
  <!-- Building mass right side -->
  <polygon points="900,0 1920,0 1920,1080 1100,1080" fill="url(#heroPanel)"/>
  <!-- Subtle seam pattern across building -->
  <polygon points="900,0 1920,0 1920,1080 1100,1080" fill="url(#heroSeam)"/>
  <!-- Copper accent stripe at edge -->
  <polygon points="900,0 920,0 1120,1080 1100,1080" fill="#C8732D" opacity="0.85"/>
  <!-- Glow -->
  <rect width="1920" height="1080" fill="url(#heroGlow)"/>
  <!-- Soft star/light -->
  <circle cx="320" cy="240" r="3" fill="#75C0D5" opacity="0.7"/>
  <circle cx="180" cy="380" r="2" fill="#B2C4DE" opacity="0.5"/>
  <circle cx="540" cy="180" r="2" fill="#75C0D5" opacity="0.6"/>
  <circle cx="700" cy="320" r="2" fill="#B2C4DE" opacity="0.4"/>
</svg>
